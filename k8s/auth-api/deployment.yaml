apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: marketmind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/marketmind/auth-api:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            # We assume secrets like MONGODB_URI are injected by External Secrets Operator
            # For this MVP without ESO, we would use a standard K8s Secret
            # referenced via envFrom:
            # - secretRef:
            #     name: auth-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/auth/
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api-svc
  namespace: marketmind
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: auth-api
