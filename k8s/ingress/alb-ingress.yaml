apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: ingress.k8s.aws/alb
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketmind-ingress
  namespace: marketmind
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # --- IMPORTANT CONFIGURATION FOR DOMAIN ---
    # Uncomment and replace with your actual AWS ACM Certificate ARN for HTTPS
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:1234567890:certificate/xxxx-xxxx-xxxx
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    
spec:
  ingressClassName: alb
  # If you set up ACM, uncomment the rules below and add your domain
  rules:
    - http:
        paths:
          # All backend API services (Auth, Chat, Predict, News) are consolidated under /api/
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ml-api-svc
                port:
                  number: 9000
                  
          # Catch-all goes to React Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
