server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React router catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy auth requests to the Node.js API
    # In Kubernetes, this connects to the auth-api-svc
    # In docker-compose, this connects to the auth-api container
    location /api/auth/ {
        proxy_pass http://auth-api-svc:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy ML requests to the FastAPI backend
    # In Kubernetes, this connects to the ml-api-svc
    # In docker-compose, this connects to the ml-api container
    location /api/ml/ {
        proxy_pass http://ml-api-svc:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Increase timeouts for slow ML models
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
